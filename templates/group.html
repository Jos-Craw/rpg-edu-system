{% extends "base.html" %}

{% block content %}
<div style="max-width: 1200px; margin: 0 auto; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1>🏰 Группа: {{ group.name }}
            <a href="{% url 'log_lesson' group.id %}" class="add-btn">
                + Добавить занятие
            </a>
        </h1>
        <a href="{% url 'home' %}" style="text-decoration: none; color: #3498db; font-weight: bold;">← Назад</a>
    </div>

    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 30px;">
        
        <div style="background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0;">📈 Прогресс опыта (XP)</h3>
            <div id="lineChart"></div>
        </div>

        <div style="background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-top: 0;">🛡️ Ранги отряда</h3>
            <div id="donutChart"></div>
        </div>
    </div>

    <div style="background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <h3 style="margin-top: 0;">👥 Участники</h3>
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="text-align: left; border-bottom: 2px solid #f8f9fa; color: #a0aec0;">
                    <th style="padding: 10px;">Имя</th>
                    <th style="padding: 10px;">Ранг</th>
                    <th style="padding: 10px;">Уровень</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr style="border-bottom: 1px solid #f8f9fa;">
                    <td style="padding: 15px 10px; font-weight: bold;">{{ s.name }}</td>
                    <td style="padding: 10px;">
                        <span class="rank rank-{{ student.rank|lower }}">
                            {{ s.rank }} {{s.get_rank_icon}}
                        </span>
                    </td>
                    <td style="padding: 10px;"><b>{{ s.level }}</b></td>
                    <td style="text-align: right;"><a href="{% url 'student_profile' s.id %}" style="color: #3498db; text-decoration: none;">Профиль →</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script>
    new ApexCharts(document.querySelector("#lineChart"), {
        series: {{ line_chart_data|safe }},
        chart: { type: 'line', height: 300, toolbar: {show: false} },
        stroke: { curve: 'smooth', width: 3 },
        xaxis: { type: 'category' },
        colors: ['#3498db', '#2ecc71', '#f1c40f', '#e74c3c']
    }).render();
    new ApexCharts(document.querySelector("#donutChart"), {
        series: {{ donut_values|safe }},
        labels: {{ donut_labels|safe }},
        chart: { type: 'donut', height: 300 },
        legend: { position: 'bottom' },
        colors: ['#3498db', '#2ecc71', '#f1c40f', '#e74c3c', '#9b59b6'],
        plotOptions: { pie: { donut: { labels: { show: true, total: { show: true, label: 'Всего' } } } } }
    }).render();
</script>
{% endblock %}
